services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - PORT=3000
      - STORAGE_PROVIDER=local
      - REDIS_URL=redis://redis:6379
      - API_SECRET_KEY=${API_SECRET_KEY:-emidia-session-secret}
      - BOT_API_KEY=${BOT_API_KEY:-emidia-session-secret}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    depends_on:
      - redis
    restart: always

  backend_worker:
    build:
      context: ./backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - REDIS_URL=redis://redis:6379
      - STORAGE_PROVIDER=local
      - API_SECRET_KEY=${API_SECRET_KEY:-emidia-session-secret}
    command: ["npm", "run", "worker:helpdesk"]
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - backend
      - redis
    restart: always

  python_bot:
    build:
      context: ./python_bot
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - API_BASE_URL=http://backend:3000/api
    # O bot precisa acessar a rede do host ou do serviço backend.
    # Usaremos a rede interna do docker-compose onde o host 'backend' resolve para o contêiner Node.js.
    depends_on:
      - backend
      - backend_worker
      - redis
    volumes:
      - ./python_bot/whatsapp_session:/app/whatsapp_session
    restart: always

volumes:
  redis_data:
