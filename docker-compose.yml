version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000
      - STORAGE_PROVIDER=local
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    restart: always

  python_bot:
    build:
      context: ./python_bot
    env_file:
      - ./backend/.env
    environment:
      - API_BASE_URL=http://backend:3000/api
    # O bot precisa acessar a rede do host ou do serviço backend.
    # Usaremos a rede interna do docker-compose onde o host 'backend' resolve para o contêiner Node.js.
    depends_on:
      - backend
    volumes:
      - ./python_bot/whatsapp_session:/app/whatsapp_session
    restart: always
