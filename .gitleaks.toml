title = "WA-PRO secret scan policy"

[extend]
useDefault = true

[[allowlists]]
description = "Allow placeholder env examples and workflow secret references"
paths = [
  '''backend/.env.example''',
  '''README.md''',
  '''SETUP_GITHUB_SECRETS.md'''
]
regexes = [
  '''\$\{\{\s*secrets\.[A-Z0-9_]+\s*\}\}''',
  '''(?i)(example|placeholder|changeme|dummy|seu_token_aqui|token_aqui|redacted|altere_antes_de_usar|substitua_pelo_hash_admin)'''
]

[[allowlists]]
description = "Historical findings already triaged in docs commit"
paths = [
  '''SECURITY_FIXES.md''',
  '''SECURITY_ANALYSIS.md'''
]
regexes = [
  '''(?i)generic-api-key'''
]
