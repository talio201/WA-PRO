title = "WA-PRO secret scan policy"

[extend]
useDefault = true

[allowlist]
description = "Allow placeholder env examples and workflow secret references"
paths = [
  '''backend/.env.example''',
  '''README.md''',
  '''SETUP_GITHUB_SECRETS.md'''
]
regexes = [
  '''\$\{\{\s*secrets\.[A-Z0-9_]+\s*\}\}''',
  '''(?i)(example|placeholder|changeme|dummy)'''
]

[[allowlists]]
description = "Historical findings already triaged in docs commit"
fingerprints = [
  "2208b137d26716c7dbeb5aa2b55e90566dddb370:SECURITY_FIXES.md:generic-api-key:125",
  "2208b137d26716c7dbeb5aa2b55e90566dddb370:SECURITY_FIXES.md:generic-api-key:260",
