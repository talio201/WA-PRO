title = "WA-PRO secret scan policy"

[extend]
useDefault = true

[allowlist]
description = "Allow placeholder env examples and workflow secret references"
paths = [
  '''backend/.env.example''',
  '''README.md''',
  '''SETUP_GITHUB_SECRETS.md'''
]
regexes = [
  '''\$\{\{\s*secrets\.[A-Z0-9_]+\s*\}\}''',
  '''(?i)(example|placeholder|changeme|dummy)'''
]
