<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo | EmidiaWhats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #818cf8;
            --secondary: #6366f1;
            --bg: #0d0d1a;
            --card-bg: rgba(30, 27, 75, 0.75);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1040 50%, #0d0d1a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(90px);
            opacity: 0.18;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: 10%; left: 10%; background: #4f46e5; }
        .blob-2 { bottom: 10%; right: 10%; background: #7c3aed; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 3rem;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(99,102,241,0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, #4f46e5, #7c3aed);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        button:active { transform: translateY(0); }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(15, 23, 42, 0.3);
            border-radius: 50%;
            border-top-color: #0f172a;
            animation: (spin 0.8s linear infinite);
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="header">
            <div style="display:flex;align-items:center;justify-content:center;gap:0.6rem;margin-bottom:0.5rem;">
                <span style="font-size:2rem;">🛡️</span>
                <h1 style="margin:0;">EmidiaWhats</h1>
            </div>
            <span style="display:inline-block;background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.5);color:#a5b4fc;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;padding:0.25rem 0.75rem;border-radius:9999px;text-transform:uppercase;margin-bottom:0.5rem;">Painel Administrativo</span>
            <p style="color:#94a3b8;font-size:0.82rem;">Acesso exclusivo para administradores</p>
        </div>

        <div id="error-msg" class="error-msg">Credenciais inválidas.</div>

        <form id="login-form">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="admin@exemplo.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" id="login-btn">
                <span id="btn-text">Entrar no Painel</span>
                <div id="loader" class="loader"></div>
            </button>
        </form>
    </div>

    <script>
        (async function initLogin() {
            const maintenanceBase = location.pathname.replace(/\/+$/, '');
            const form = document.getElementById('login-form');
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const errorMsg = document.getElementById('error-msg');

            let supabaseClient = null;
            try {
                const response = await fetch('/api/public/runtime-config');
                const payload = await response.json();
                const supabaseUrl = String(payload?.config?.supabase?.url || '').trim();
                const supabaseAnonKey = String(payload?.config?.supabase?.anonKey || '').trim();
                if (!supabaseUrl || !supabaseAnonKey) {
                    throw new Error('Supabase não configurado no servidor.');
                }
                supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);
            } catch (error) {
                errorMsg.innerText = 'Configuração de autenticação indisponível. Contate o administrador.';
                errorMsg.style.display = 'block';
                btn.disabled = true;
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                errorMsg.style.display = 'none';
                btnText.style.display = 'none';
                loader.style.display = 'block';
                btn.disabled = true;

                const { error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) {
                    errorMsg.innerText = error.message;
                    errorMsg.style.display = 'block';
                    btnText.style.display = 'block';
                    loader.style.display = 'none';
                    btn.disabled = false;
                } else {
                    const { data: { session } } = await supabaseClient.auth.getSession();
                    const accessResponse = await fetch('/api/admin/access/me', {
                        headers: {
                            'Authorization': `Bearer ${session?.access_token || ''}`,
                            'x-agent-id': 'admin-console',
                        }
                    });
                    const accessPayload = await accessResponse.json().catch(() => ({}));
                    if (!accessPayload?.allowed) {
                        await supabaseClient.auth.signOut();
                        errorMsg.innerText = 'Sua conta não tem acesso administrativo.';
                        errorMsg.style.display = 'block';
                        btnText.style.display = 'block';
                        loader.style.display = 'none';
                        btn.disabled = false;
                        return;
                    }
                    window.location.href = `${maintenanceBase}/dashboard`;
                }
            });
        })();
    </script>
</body>
</html>
