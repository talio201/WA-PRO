name: Deploy to DigitalOcean (Student Pack)

on:
  workflow_dispatch:

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)(\.env(\..*)?$|id_rsa(\.pub)?$|id_ed25519(\.pub)?$|ed25519(\.pub)?$|.*\.(pem|key|p12|pfx|jks|kdbx|ovpn|crt|cer)$|.*credentials.*|.*secret.*)'
          bad_files=$(git ls-files | grep -E "$forbidden" | grep -Ev '(^|/)\.env\.example$' || true)
          if [ -n "$bad_files" ]; then
            echo "Forbidden sensitive files tracked by git:"
            echo "$bad_files"
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /opt/EmidiaWhats
            git pull origin main
            docker-compose down
            docker-compose up -d --build
