name: Deploy to DigitalOcean - Safe Zero-Downtime

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  security-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)(\.env(\..*)?$|id_rsa(\.pub)?$|id_ed25519(\.pub)?$|ed25519(\.pub)?$|.*\.(pem|key|p12|pfx|jks|kdbx|ovpn|crt|cer)$|.*credentials.*|.*secret.*)'
          bad_files=$(git ls-files | grep -E "$forbidden" | grep -Ev '(^|/)\.env\.example$' || true)
          if [ -n "$bad_files" ]; then
            echo "Forbidden sensitive files tracked by git:"
            echo "$bad_files"
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  deploy:
    needs: security-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preflight SSH reachability
        shell: bash
        run: |
          set -euo pipefail
          host='${{ secrets.DO_HOST }}'
          port='${{ secrets.DO_PORT || 22 }}'
          if [ -z "$host" ]; then
            echo "::error::Missing required secret DO_HOST"
            exit 1
          fi
          echo "Testing TCP connectivity to ${host}:${port}"
          if ! timeout 8 bash -lc "cat < /dev/null > /dev/tcp/${host}/${port}"; then
            echo "::error::Cannot reach ${host}:${port} from GitHub runner. Check cloud firewall/ACL, host firewall (ufw/iptables), and sshd ListenPort."
            exit 1
          fi
          echo "TCP connectivity OK"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || 22 }}
          timeout: 120s
          debug: true
          script: |
             set -euo pipefail
             cd /opt/EmidiaWhats
             echo "🚀 Starting safe zero-downtime deploy..."

             # Keep an always-valid rollback target before updating code.
             PREV_SHA=$(git rev-parse HEAD)
             echo "Previous SHA: $PREV_SHA"
             
             # Fetch and update without disruption
             git fetch origin main
             git pull --ff-only origin main
             
             # Build containers without stopping current ones
             docker compose build
             
             # Health check current service before deploy
             echo "Checking current service health..."
             max_retries=10
             retry_count=0
             while [ $retry_count -lt $max_retries ]; do
               if curl -f http://localhost:3000/health > /dev/null 2>&1; then
                 echo "✓ Current service is healthy"
                 break
               fi
               retry_count=$((retry_count + 1))
               if [ $retry_count -eq $max_retries ]; then
                 echo "⚠ Current service not responding (may be first deployment)"
               fi
               sleep 1
             done
             
             # Start new containers (rolling update - no downtime)
             echo "Deploying new containers..."
             docker compose up -d --no-deps --build backend backend_worker python_bot
             
             sleep 5
             
             # Health check new service
             echo "Verifying new service health..."
             max_retries=60
             retry_count=0
             success=false
             while [ $retry_count -lt $max_retries ]; do
               if curl -fsS http://localhost:3000/health > /dev/null 2>&1; then
                 echo "✓ New service is healthy - deploy successful!"
                 success=true
                 break
               fi
               retry_count=$((retry_count + 1))
               echo "  Waiting for service... ($retry_count/$max_retries)"
               sleep 2
             done
             
             if [ "$success" = false ]; then
               echo "✗ New service failed health check - ROLLING BACK"
               echo "Health check failed. Showing backend logs before rollback:"
               docker compose logs --tail=200 backend || true

               echo "Rolling back to $PREV_SHA"
               git checkout --force "$PREV_SHA"
               docker compose rm -sf backend backend_worker python_bot || true
               docker compose up -d --build backend backend_worker python_bot
               echo "Rollback completed"
               exit 1
             fi
             
             echo "✓ Deploy completed successfully"
             docker compose ps
