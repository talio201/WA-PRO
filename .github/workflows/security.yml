name: Security Gate

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  secrets-and-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)(\.env(\..*)?$|id_rsa(\.pub)?$|id_ed25519(\.pub)?$|ed25519(\.pub)?$|.*\.(pem|key|p12|pfx|jks|kdbx|ovpn|crt|cer)$|.*credentials.*|.*secret.*)'
          bad_files=$(git ls-files | grep -E "$forbidden" | grep -Ev '(^|/)\.env\.example$' || true)
          if [ -n "$bad_files" ]; then
            echo "Forbidden sensitive files tracked by git:"
            echo "$bad_files"
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_COMMENTS: false

  dependency-audit-node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        target:
          - .
          - backend
          - webapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            webapp/package-lock.json

      - name: npm audit (high+)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "${{ matrix.target }}/package.json" ]; then
            echo "No package.json in ${{ matrix.target }}; skipping"
            exit 0
          fi
          cd "${{ matrix.target }}"
          npm ci
          npm audit --omit=dev --audit-level=high

  dependency-audit-python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: pip-audit requirements
        run: |
          pip-audit -r python_bot/requirements.txt --strict
