name: Security Gate

on:
  pull_request:
  push:
    branches:
      - "**"

jobs:
  secrets-and-policy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block forbidden tracked files
        shell: bash
        run: |
          set -euo pipefail
          forbidden='(^|/)(\.env(\..*)?$|id_rsa(\.pub)?$|id_ed25519(\.pub)?$|ed25519(\.pub)?$|.*\.(pem|key|p12|pfx|jks|kdbx|ovpn|crt|cer)$|.*credentials.*|.*secret.*)'
          bad_files=$(git ls-files | grep -E "$forbidden" | grep -Ev '(^|/)\.env\.example$' || true)
          if [ -n "$bad_files" ]; then
            echo "Forbidden sensitive files tracked by git:"
            echo "$bad_files"
            exit 1
          fi

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_COMMENTS: false
