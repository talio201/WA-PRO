name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"  # Runs every 5 minutes
  workflow_dispatch:        # Allows manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="https://emidiawhats.onrender.com/health"
          echo "Pinging: $URL"
          for i in 1 2 3; do
            echo "Attempt $i..."
            if curl -fsS --max-time 10 "$URL"; then
              echo "Success!"
              exit 0
            fi
            sleep 5
          done
          echo "Failed to ping after retries"
          exit 1
